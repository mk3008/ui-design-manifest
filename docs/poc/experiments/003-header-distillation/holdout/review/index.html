<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Global Header Specimen</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="global-header">
      <a class="identity-link" href="#" aria-label="Go to product home">
        <svg class="identity-mark" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="3" />
          <circle cx="12" cy="12" r="2.5" fill="currentColor" />
        </svg>
        <span>Home</span>
      </a>

      <nav class="product-navigation" aria-label="Product navigation">
        <a href="#">Explore</a>
        <a href="#">Solutions</a>
        <a href="#">Resources</a>
      </nav>

      <button class="search-entry" type="button" aria-label="Open global search">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="10.5" cy="10.5" r="6.5" fill="none" stroke="currentColor" stroke-width="2" />
          <path d="m15.5 15.5 4 4" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2" />
        </svg>
        <span class="search-label">Search</span>
        <span class="shortcut-cue" aria-hidden="true">Ctrl K</span>
      </button>

      <div class="account-actions" role="group" aria-label="Account actions">
        <a class="primary-action" href="#">Start free</a>
        <a class="secondary-action" href="#">Sign in</a>
      </div>
    </header>
  </body>
</html>
