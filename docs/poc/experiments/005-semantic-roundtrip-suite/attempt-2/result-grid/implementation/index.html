<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Result-grid static evidence</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="result-region">
      <h1 class="region-header">Header-I</h1>

      <section class="result-collection">
        <article class="result-entry">
          <div class="entry-copy">
            <h2 class="record-title">Record-I</h2>
            <p class="metadata">Metadata-I</p>
          </div>
          <span class="marker">Marker-I</span>
        </article>

        <article class="result-entry">
          <div class="entry-copy">
            <h2 class="record-title">Record-II</h2>
            <p class="metadata">Metadata-II</p>
          </div>
          <span class="marker">Marker-II</span>
        </article>
      </section>
    </main>
  </body>
</html>
