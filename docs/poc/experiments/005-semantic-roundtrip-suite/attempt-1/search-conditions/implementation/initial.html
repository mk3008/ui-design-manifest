<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Static condition-entry evidence</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="initial.css">
  </head>
  <body>
    <main class="evidence-canvas">
      <form class="condition-entry" aria-label="Condition-entry group">
        <select aria-label="Field" data-slot="field">
          <option selected>field-1</option>
        </select>
        <select aria-label="Operator" data-slot="operator">
          <option selected>operator-1</option>
        </select>
        <input aria-label="Value" data-slot="value" value="value-1" readonly>
        <input aria-label="Selection" data-slot="selection" type="checkbox">
        <button data-slot="submit" type="button">submit-1</button>
      </form>
    </main>
  </body>
</html>
