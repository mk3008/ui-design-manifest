<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Static result grid</title>
    <link rel="stylesheet" href="initial.css">
  </head>
  <body>
    <main class="host-demo" aria-label="Result grid demonstration">
      <table class="result-grid">
        <colgroup>
          <col class="selection-column">
          <col class="text-column">
          <col class="numeric-column">
          <col class="filler-column">
        </colgroup>
        <thead>
          <tr>
            <th scope="col" class="selection-cell"><input type="checkbox" aria-label="Select all placeholder records"></th>
            <th scope="col" aria-sort="ascending"><span class="header-control">Placeholder text <span class="sort-icon" aria-hidden="true">↑</span></span></th>
            <th scope="col" class="numeric-cell">Placeholder number</th>
            <th scope="col" class="filler-cell" aria-hidden="true"></th>
          </tr>
        </thead>
        <tbody>
          <tr class="selected-row">
            <td class="selection-cell"><input type="checkbox" checked aria-label="Select placeholder record 1"></td>
            <td>Placeholder one</td>
            <td class="numeric-cell">12</td>
            <td class="filler-cell" aria-hidden="true"></td>
          </tr>
          <tr>
            <td class="selection-cell"><input type="checkbox" aria-label="Select placeholder record 2"></td>
            <td>Placeholder two</td>
            <td class="numeric-cell">4</td>
            <td class="filler-cell" aria-hidden="true"></td>
          </tr>
        </tbody>
      </table>
    </main>
  </body>
</html>
