<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Global Header specimen</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="global-header">
      <div class="global-header__inner">
        <a class="identity control" href="#home" aria-label="Product home">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h6v6h-6z" />
          </svg>
        </a>

        <nav class="global-nav" aria-label="Product navigation">
          <button class="nav-trigger control" type="button">
            Product
            <svg aria-hidden="true" viewBox="0 0 16 16"><path d="m4 6 4 4 4-4" /></svg>
          </button>
          <button class="nav-trigger control" type="button">
            Solutions
            <svg aria-hidden="true" viewBox="0 0 16 16"><path d="m4 6 4 4 4-4" /></svg>
          </button>
          <button class="nav-trigger control" type="button">
            Resources
            <svg aria-hidden="true" viewBox="0 0 16 16"><path d="m4 6 4 4 4-4" /></svg>
          </button>
          <button class="nav-trigger control" type="button">
            Developers
            <svg aria-hidden="true" viewBox="0 0 16 16"><path d="m4 6 4 4 4-4" /></svg>
          </button>
          <button class="nav-trigger control" type="button">
            Company
            <svg aria-hidden="true" viewBox="0 0 16 16"><path d="m4 6 4 4 4-4" /></svg>
          </button>
          <a class="nav-destination control" href="#pricing">Pricing</a>
        </nav>

        <button class="search-trigger control" type="button">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="6.5" />
            <path d="m16 16 4 4" />
          </svg>
          <span>Search</span>
        </button>

        <div class="account-entry" aria-label="Account access">
          <a class="sign-in control" href="#sign-in">Sign in</a>
          <a class="create-account control" href="#create-account">Create account</a>
        </div>

        <button class="appearance-trigger control" type="button" aria-label="Appearance preferences">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6 7 7M17 17l1.4 1.4M18.4 5.6 17 7M7 17l-1.4 1.4" />
            <circle cx="12" cy="12" r="4" />
          </svg>
        </button>
      </div>
    </header>
  </body>
</html>
