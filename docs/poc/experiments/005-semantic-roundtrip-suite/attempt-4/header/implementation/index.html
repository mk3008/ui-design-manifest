<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Application Header</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="global-header" aria-label="Global Header">
      <div class="header-row">
        <h1 class="identity-title">Application</h1>
        <nav class="global-navigation" aria-label="Global navigation">
          <button class="text-control" type="button">Section</button>
        </nav>
        <div class="search-group" aria-label="Search">
          <button class="text-control" type="button">Search</button>
        </div>
        <div class="utility-group" aria-label="Utilities">
          <button class="icon-control" type="button" aria-label="Preferences">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M4 7h10M18 7h2M4 12h3M11 12h9M4 17h10M18 17h2M14 5v4M7 10v4M16 15v4" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"/>
            </svg>
          </button>
        </div>
      </div>
    </header>
    <main class="work-surface" aria-label="Work surface"></main>
  </body>
</html>
