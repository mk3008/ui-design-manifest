<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Condition entry panel</title>
    <link rel="stylesheet" href="initial.css">
  </head>
  <body>
    <main class="condition-panel" aria-label="Condition entry">
      <form>
        <div class="condition-list">
          <div class="condition-row">
            <label><span>Attribute</span><select aria-label="Attribute"><option>Attribute</option></select></label>
            <label><span>Comparison</span><select aria-label="Comparison"><option>Comparison</option></select></label>
            <label><span>Text value</span><input type="text" value="Text value" aria-label="Text value"></label>
            <label class="enabled"><input type="checkbox" checked><span>Enabled</span></label>
          </div>
          <div class="condition-row">
            <label><span>Attribute</span><select aria-label="Attribute"><option>Attribute</option></select></label>
            <label><span>Comparison</span><select aria-label="Comparison"><option>Comparison</option></select></label>
            <label><span>Text value</span><input type="text" value="Text value" aria-label="Text value"></label>
            <label class="enabled"><input type="checkbox" checked><span>Enabled</span></label>
          </div>
          <div class="condition-row">
            <label><span>Attribute</span><select aria-label="Attribute"><option>Attribute</option></select></label>
            <label><span>Comparison</span><select aria-label="Comparison"><option>Comparison</option></select></label>
            <label><span>Text value</span><input type="text" value="Text value" aria-label="Text value"></label>
            <label class="enabled"><input type="checkbox" checked><span>Enabled</span></label>
          </div>
          <div class="condition-row">
            <label><span>Attribute</span><select aria-label="Attribute"><option>Attribute</option></select></label>
            <label><span>Comparison</span><select aria-label="Comparison"><option>Comparison</option></select></label>
            <label><span>Text value</span><input type="text" value="Text value" aria-label="Text value"></label>
            <label class="enabled"><input type="checkbox" checked><span>Enabled</span></label>
          </div>
        </div>
        <div class="panel-actions">
          <button type="button" class="text-action">Add condition</button>
          <div class="submit-actions"><button type="button" class="secondary">Clear</button><button type="button" class="primary">Apply</button></div>
        </div>
      </form>
      <div class="results-boundary" aria-hidden="true"></div>
    </main>
  </body>
</html>
