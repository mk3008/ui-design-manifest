summary: >-
  P1 findings block implementation. The bundle repeatedly calls the observed visible-open
  drawer or its region "persistent" while also declaring persistence outside observed scope.
  Its application-input contract also lacks the navigation hierarchy/group-label inputs that
  the guidance requires and that fixtures are forbidden to invent.
findings:
  - id: P1-001
    severity: P1
    status: open
    category: unobserved-state-conflation
    locations:
      - docs/poc/experiments/002-drawer-distillation/phase-2b1-attempt-2/design-manifest/manifest.md
      - docs/poc/experiments/002-drawer-distillation/phase-2b1-attempt-2/design-manifest/components/drawer-navigation.md
      - docs/poc/experiments/002-drawer-distillation/phase-2b1-attempt-2/design-manifest/foundations/navigation-grouping.md
      - docs/poc/experiments/002-drawer-distillation/phase-2b1-attempt-2/design-manifest/screen-patterns/open-drawer.md
    evidence: >-
      These files describe the visible drawer or navigation region as "persistent" (including
      "persistent left-side orientation and navigation region" and "visible persistent
      navigation drawer"), but manifest.md and open-drawer.md explicitly state that persistence
      or persistence policy is outside the observed scope.
    impact: >-
      In this context, "persistent" normally asserts state across time, locations, or viewport
      changes. Qualifying it with the declared open state does not resolve that semantic claim;
      it conflates the observed presentation (visible, full-height, beside content) with an
      unobserved persistence policy.
    required_correction: >-
      Replace "persistent" with strictly presentational language such as "visible" or
      "fixed-position visual region" only where that geometry is observed; keep temporal/state
      persistence explicitly unresolved and owner-supplied if needed.
  - id: P1-002
    severity: P1
    status: open
    category: application-input-contract-incomplete
    locations:
      - docs/poc/experiments/002-drawer-distillation/phase-2b1-attempt-2/design-manifest/policies/application-input-contract.md
      - docs/poc/experiments/002-drawer-distillation/phase-2b1-attempt-2/design-manifest/policies/fixture-policy.md
      - docs/poc/experiments/002-drawer-distillation/phase-2b1-attempt-2/design-manifest/foundations/navigation-grouping.md
    evidence: >-
      Guidance requires parent-child relationships and group labels, while fixture-policy.md
      forbids fixtures from introducing hierarchy labels. The application input contract requires
      targets and accessible names but does not require the owner to provide the navigation tree,
      parent-child relationships, grouping membership/order, or group labels.
    impact: >-
      An implementer has no permitted owner-supplied source for the hierarchy and labels required
      to apply the guidance. Supplying them would invent product semantics; omitting them would
      fail to exercise the defined grouping guidance.
    required_correction: >-
      Add a bounded navigation-information input covering hierarchy, group membership/order,
      labels, and their provenance/update conditions, with omission or product-decision behavior
      when those inputs are unavailable.
