<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Operational table specimen</title>
    <link rel="stylesheet" href="initial-result.css">
  </head>
  <body>
    <main class="specimen" aria-label="Read-only record table specimen">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th scope="col">State</th>
              <th scope="col">Record</th>
              <th scope="col">Context</th>
              <th scope="col">Summary</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td aria-label=""></td>
              <td class="record">Item 1</td>
              <td class="context">Context A</td>
              <td aria-label=""></td>
            </tr>
            <tr>
              <td aria-label=""></td>
              <td class="record">Item 2</td>
              <td class="context">Context B</td>
              <td aria-label=""></td>
            </tr>
            <tr>
              <td aria-label=""></td>
              <td class="record">Item 3</td>
              <td class="context">Context C</td>
              <td aria-label=""></td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </body>
</html>
