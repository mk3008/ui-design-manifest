<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Result grid calibration</title>
    <link rel="stylesheet" href="initial.css">
  </head>
  <body>
    <main class="result-grid" aria-label="Result grid">
      <table>
        <colgroup>
          <col class="selection-column">
          <col class="text-column">
          <col class="numeric-column">
        </colgroup>
        <thead>
          <tr>
            <th scope="col" class="selection-heading"><span class="visually-hidden">Selection</span></th>
            <th scope="col">
              <span class="sort-control">Text label
                <svg class="sort-icon" viewBox="0 0 12 12" aria-hidden="true" focusable="false">
                  <path d="M6 2.1 9.2 5.5H7v4.4H5V5.5H2.8L6 2.1Z" fill="currentColor" />
                </svg>
              </span>
            </th>
            <th scope="col" class="numeric-heading">Numeric label</th>
          </tr>
        </thead>
        <tbody>
          <tr class="is-selected">
            <td class="selection-cell"><input type="checkbox" aria-label="Select placeholder one" checked></td>
            <td>Placeholder one</td>
            <td class="numeric-cell">12</td>
          </tr>
          <tr>
            <td class="selection-cell"><input type="checkbox" aria-label="Select placeholder two"></td>
            <td>Placeholder two</td>
            <td class="numeric-cell">34</td>
          </tr>
        </tbody>
      </table>
    </main>
  </body>
</html>
