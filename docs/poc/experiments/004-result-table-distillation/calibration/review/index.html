<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Read-only result table review</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="review-surface">
      <table class="result-table">
        <thead>
          <tr>
            <th scope="col">Record state</th>
            <th scope="col">Primary record</th>
            <th scope="col">Identity context</th>
            <th scope="col">Grouped state summary</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="record-state">State A</td>
            <td class="primary-record">Record A</td>
            <td class="identity-context">Identity A</td>
            <td><div class="grouped-summary"><span>A1</span><span>A2</span><span>A3</span></div></td>
          </tr>
          <tr>
            <td class="record-state">State B</td>
            <td class="primary-record">Record B</td>
            <td class="identity-context">Identity B</td>
            <td><div class="grouped-summary"><span>B1</span><span>B2</span><span>B3</span></div></td>
          </tr>
        </tbody>
      </table>
    </main>
  </body>
</html>
